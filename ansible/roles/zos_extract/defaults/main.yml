---
# See zos-extract/README.md for what each of these corresponds to.
# Per-LPAR values (zos_extract_proclibs, zos_extract_smpe_csis, zos_extract_catalog_patterns, ...) belong in
# inventory/hosts.yml, not here -- these are just the defaults that are
# reasonable to share across every site.

zos_extract_proclibs: []          # [{dsn: SYS1.PROCLIB, prefix: "00"}, ...]
zos_extract_parmlibs: []          # [{dsn: SYS1.PARMLIB, prefix: "00"}, ...]
zos_extract_jes2_init_members: [] # exact dsn(member) pairs JES2 read at startup,
                                   # [{dsn: ..., member: "JES2PABN"}, ...] -- see
                                   # discover_jes2_parmlib.yml; separate from
                                   # zos_extract_parmlibs above
zos_extract_jes2parm_outfile: "jes2parm.txt"

# Output filenames for the explicit, always-run active-PARMLIB-family
# snapshots (parmlib_snapshot.yml/ieasys_snapshot.yml/bpxprm_snapshot.yml/
# devsup_snapshot.yml/opt_snapshot.yml/clock_snapshot.yml/
# autor_snapshot.yml/sched_snapshot.yml/couple_snapshot.yml/
# grsrnl_snapshot.yml/smf_snapshot.yml/ios_snapshot.yml/
# consol_snapshot.yml/igdsms_snapshot.yml). Parameterized the same way
# every other domain's *_outfile default is, so `inventory ingest`
# (which globs on these, not an exact filename -- see cli.py) still
# finds them if you change one.
zos_extract_parmlib_snapshot_outfile: "parmlib_snapshot.txt"
zos_extract_ieasys_snapshot_outfile: "ieasys_snapshot.txt"
zos_extract_bpxprm_snapshot_outfile: "bpxprm_snapshot.txt"
zos_extract_devsup_snapshot_outfile: "devsup_snapshot.txt"
zos_extract_opt_snapshot_outfile: "opt_snapshot.txt"
zos_extract_clock_snapshot_outfile: "clock_snapshot.txt"
zos_extract_autor_snapshot_outfile: "autor_snapshot.txt"
zos_extract_sched_snapshot_outfile: "sched_snapshot.txt"
zos_extract_couple_snapshot_outfile: "couple_snapshot.txt"
zos_extract_grsrnl_snapshot_outfile: "grsrnl_snapshot.txt"
zos_extract_smf_snapshot_outfile: "smf_snapshot.txt"
zos_extract_ios_snapshot_outfile: "ios_snapshot.txt"
zos_extract_consol_snapshot_outfile: "consol_snapshot.txt"
# Distinct name from zos_extract_sms_outfile (the *live* `D SMS,STORGRP`
# snapshot below) on purpose -- this is the active IGDSMSxx PARMLIB
# member instead, named by IEASYSxx's own SMS= keyword; see
# igdsms_snapshot.yml's own header comment for the full naming-collision
# rationale (doc/TODO.md "9.2").
zos_extract_igdsms_snapshot_outfile: "igdsms_snapshot.txt"
zos_extract_izuprm_snapshot_outfile: "izuprm_snapshot.txt"
zos_extract_diag_snapshot_outfile: "diag_snapshot.txt"

zos_extract_ssn_member_filter: "IEFSSN*"
zos_extract_commnd_member_filter: "COMMND*"
zos_extract_ifaprd_member_filter: "IFAPRD*"

# List of CSIs to report on, each with its own target zones --
# [{csi: "EDUC.SOME.GLOBAL.CSI", zones: ["TZONE1", "DZONE1"]}, ...]. A real
# site can have several distinct CSIs (see zos_extract_smpe_csi_search_patterns/
# discover_smpe_csis.yml below) -- this replaced the older singular
# zos_extract_smpe_csi/zos_extract_smpe_zones scalars (no back-compat shim,
# same precedent as zos_extract_jes2_init_members's own rename -- see
# doc/TODO.md "8c") so a single ingest run can actually cover more than one.
zos_extract_smpe_csis: []
zos_extract_smpe_steplib: ""
# Only used to name the one real (non-output-capturing) scratch work data
# set GIMSMP itself needs (SMPWRK6) -- see smplist.yml.
zos_extract_smpe_workhlq: "{{ ansible_user | upper }}.SMPLIST"
# SMPWRK6's own space (megabytes) -- GIMSMP needs more of this the bigger
# the target zone's SYSMOD/MOD list is. A single-product zone fits easily
# in a few MB, but a base z/OS target zone (e.g. a system's own MVST) can
# need much more; a fixed primary allocation with no secondary at all
# previously caused a real B37-04 (out of space, no extent to grow into)
# against exactly that kind of zone. Bump these further if you still hit
# B37 against your own site's largest zone.
zos_extract_smpe_smpwrk6_primary: 50
zos_extract_smpe_smpwrk6_secondary: 50
# The real SMPLIST report data set's own space (megabytes) -- unlike
# SMPWRK6 (internal scratch work), this holds the actual LIST DDDEF/MOD/
# SYSMOD report text GIMSMP prints, which for a base z/OS target zone can
# run into the millions of lines (multiple GB) -- see _smplist_zone.yml's
# header comment for why this is now a real persistent data set (fetched
# via zos_fetch) rather than an in-memory return_content capture. Sized
# generously by default for that scale; bump further for anything larger
# still. record_format/lrecl matter here too -- GIMSMP's own LIST report
# lines are printer-style (ASA carriage control in column 1), 133 is a
# safe common width, but tune it if your site's real report gets
# truncated at that column.
zos_extract_smpe_smplist_primary: 2000
zos_extract_smpe_smplist_secondary: 2000
zos_extract_smpe_smplist_record_format: "fba"
zos_extract_smpe_smplist_lrecl: 133
# Candidate search for zos_extract_smpe_csi -- see discover_smpe_csis.yml.
# Only runs when the smpe_csi_discovery tag is selected, so this default
# is safe to leave in place for every run. All of this site's CSIs live
# under the EDUC HLQ, so zos_find (a narrow, indexed catalog lookup, not
# a full scan) can find them directly -- any CSIs outside that
# convention are stragglers to track down by hand.
zos_extract_smpe_csi_search_patterns: ["EDUC.**.CSI"]
# EDUC.**.CSI also picks up each CSI's own DATA/INDEX component clusters
# (named e.g. EDUC.SOME.CSI.D/EDUC.SOME.CSI.I at this site) -- these are
# real full-name regexes (zos_find's own excludes rules), not the
# */**/? dsname-wildcard syntax patterns uses.
zos_extract_smpe_csi_excludes: ['^.*\.CSI\.[ID]$']
zos_extract_smpe_csi_candidates_outfile: "smpe_csi_candidates.txt"

zos_extract_catalog_patterns: []
zos_extract_catalog_outfile: "catalog.txt"

zos_extract_uss_mounts_outfile: "uss_mounts.txt"

zos_extract_vtam_outfile: "vtam.txt"

zos_extract_tcpip_outfile: "tcpip.txt"
# Optional: DSN of the PROFILE.TCPIP-style dataset (sequential, or a PDS
# member e.g. "TCPIP.TCPPARMS(PROFILE1)") to fetch verbatim -- see
# tcpip.yml. Leave blank to skip; D TCPIP,,NETSTAT,HOME still runs either way.
zos_extract_tcpip_profile_dsn: ""

zos_extract_sms_outfile: "sms.txt"

zos_extract_wlm_outfile: "wlm.txt"

# Opt-in WLM deepening via z/OSMF's REST API (full service-class/goal
# definitions, not just the active policy name/mode above) -- see
# wlm_zosmf.yml and playbooks/wlm_zosmf.yml. Credentials are deliberately
# NOT defaulted/stored here; playbooks/wlm_zosmf.yml prompts for them at
# runtime instead.
zos_extract_zosmf_host: "{{ ansible_host }}"
zos_extract_zosmf_port: 443
zos_extract_zosmf_username: ""
zos_extract_zosmf_password: ""
# validate_certs defaults to false: many internal z/OSMF instances present
# a self-signed/internal-CA cert. Set true if yours is trusted normally.
zos_extract_zosmf_validate_certs: false
# Best guess only -- NOT confirmed against IBM's z/OSMF REST API
# reference or a real response; see wlm_zosmf.yml's own header comment
# and wlm_zosmf_parser.py's module docstring before trusting this.
zos_extract_wlm_zosmf_path: "/zosmf/wlm/policies"
zos_extract_wlm_zosmf_outfile: "wlm_zosmf.txt"

zos_extract_racf_database_dsn: ""

# Opt-in live "what's running" CICS/DB2 discovery -- see
# discover_active_address_spaces.yml, cics.yml, db2.yml. Matches active
# address spaces by PROCSTEP ("CICS"/"DB2PROC", confirmed against a
# real reply) OR'd with a job-name pattern (this site's actual
# conventions). No CMCI/CICSplex SM at this site, so CICS discovery
# can't reach real resource definitions -- just which regions/address
# spaces are up right now.
zos_extract_cics_job_patterns: ["CTS*", "ECB2*", "MTSEDUC*"]
zos_extract_cics_outfile: "cics.txt"
zos_extract_db2_job_patterns: ["DB2*"]
zos_extract_db2_outfile: "db2.txt"

# Opt-in deepened DB2 catalog view (installed packages/plans via a
# read-only DSNTEP2 batch SQL query) -- see db2_catalog.yml. Distinct
# from the live address-space heuristic above: requires a real DB2
# subsystem ID and a plan already bound there for DSNTEP2.
zos_extract_db2_ssid: ""
zos_extract_db2_plan: "DSNTEP2"
zos_extract_db2_steplib: ""
zos_extract_db2_catalog_outfile: "db2_catalog.txt"

# Opt-in deepened CICS resource view: DFHRPL lineage + DFHCSDUP CSD
# definitions (see cics_deepening.yml). Distinct from the live
# address-space heuristic above (cics.yml/zos_extract_cics_job_patterns):
# there's no reliable live-discoverable link from a running CICS job name
# back to its starting PROCLIB member, so this requires explicit
# configuration (same precedent as zos_extract_db2_ssid/
# zos_extract_smpe_csi) rather than a fragile job-name-to-PROC-name
# cross-reference.
zos_extract_cics_proc: []              # CICS startup PROCLIB member name(s), e.g. ["CICSPROC"]
# STEPLIB for DFHCSDUP itself (the CICS SDFHLOAD library) -- DFHCSDUP
# isn't normally reachable via LNKLST. Leave blank to skip the DFHCSDUP
# LIST job entirely (DFHRPL/SIT/CSD-dsn discovery above still runs).
zos_extract_cics_sdfhload: ""
# Work dataset HLQ for DFHCSDUP's own SYSUT1 scratch file, same idiom as
# zos_extract_smpe_workhlq.
zos_extract_cics_workhlq: "{{ ansible_user | upper }}.CSDUP"
zos_extract_cics_deepening_outfile: "cics_deepening.txt"

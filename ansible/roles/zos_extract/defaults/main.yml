---
# See zos-extract/README.md for what each of these corresponds to.
# Per-LPAR values (zos_extract_proclibs, zos_extract_smpe_csi, zos_extract_catalog_patterns, ...) belong in
# inventory/hosts.yml, not here -- these are just the defaults that are
# reasonable to share across every site.

zos_extract_proclibs: []          # [{dsn: SYS1.PROCLIB, prefix: "00"}, ...]
zos_extract_parmlibs: []          # [{dsn: SYS1.PARMLIB, prefix: "00"}, ...]

zos_extract_ssn_member_filter: "IEFSSN*"
zos_extract_commnd_member_filter: "COMMND*"
zos_extract_ifaprd_member_filter: "IFAPRD*"

zos_extract_smpe_csi: ""
zos_extract_smpe_zones: []
zos_extract_smpe_steplib: ""
# Only used to name the one real (non-output-capturing) scratch work data
# set GIMSMP itself needs (SMPWRK6) -- see smplist.yml.
zos_extract_smpe_workhlq: "{{ ansible_user | upper }}.SMPLIST"
# Candidate search for zos_extract_smpe_csi -- see discover_smpe_csis.yml.
# Only runs when the smpe_csi_discovery tag is selected, so this default
# is safe to leave in place for every run. "**.CSI" is this site's actual
# naming convention (every CSI ends in .CSI, no shared prefix) -- a
# leading-wildcard/suffix-only search like this has no catalog-search
# primitive on z/OS, so discover_smpe_csis.yml does a full LISTCAT
# CLUSTER scan and filters client-side rather than using zos_find (which
# doesn't support leading wildcards at all -- confirmed against a real
# run, see that file). If your site's CSI names DO share a prefix, use a
# narrower pattern (e.g. "SMPE.*.CSI") instead -- cheaper, and zos_find
# can handle it directly.
zos_extract_smpe_csi_search_patterns: ["**.CSI"]
# LISTCAT with no CATALOG() override only searches the connected default
# catalog -- name any additional user catalogs here to also search them.
zos_extract_smpe_csi_search_catalogs: []
zos_extract_smpe_csi_candidates_outfile: "smpe_csi_candidates.txt"

zos_extract_catalog_patterns: []
zos_extract_catalog_outfile: "catalog.txt"

zos_extract_racf_database_dsn: ""

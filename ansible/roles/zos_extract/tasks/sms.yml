---
# SMS storage groups (unconditional -- same "capture raw, parse off-host"
# idiom vtam.yml/tcpip.yml already use).
#
# CORRECTED, not just unconfirmed: this originally also issued 'D
# SMS,SC(*)' and 'D SMS,MC(*)' to list storage classes and management
# classes -- both confirmed INVALID against a real system, and IBM's own
# full 'D SMS' command syntax reference confirms why: there is no
# console D-command that lists storage classes or management classes at
# all. STORCLAS only appears as a *filter* on the unrelated PDSE
# HSPSTATS cache-statistics command ('D SMS,PDSE,HSPSTATS,STORCLAS(sc)'),
# not as its own listing command, and MGMTCLAS doesn't appear in the 'D
# SMS' syntax at all. Reading real storage/management class definitions
# needs ISMF (or a batch report against the SCDS/ACDS), the same
# "needs ISMF, not a D-command" limitation this project already
# documented for ACS routine *source* -- now known to apply to the class
# definitions themselves too, not just their ACS routine logic. Not
# attempted here; a candidate follow-up in the same category as CICS's
# DFHCSDUP/DB2's DSNTEP2/RACF's IRRDBU00 (a batch job, not a console
# command) if ever picked up.
#
# 'D SMS,STORGRP(*),LISTVOL' also had a real syntax bug: IBM's documented
# 'D SMS' syntax only accepts a specific storage group name, 'ALERT', or
# 'ALL' for this operand -- not '*' -- corrected to 'D SMS,STORGRP(ALL),
# LISTVOL' accordingly ('STORGRP' and its 'SG' alias are documented as
# equivalent; a real reply was confirmed via 'D SMS,SG(ALL),LISTVOL').
#
# CONFIRMED against a real reply, and the real shape turned out to be
# completely different from the original guess -- not one "header line +
# indented VOLSER lines" per group, but two separate sections (a
# storage-group summary table with per-system status symbols, and an
# entirely separate flat VOLUME-to-STORGRP mapping table). sms_parser.py
# was rewritten from scratch against the real text; see its module
# docstring for the full detail.

- name: Issue D SMS,STORGRP(ALL),LISTVOL
  ibm.ibm_zos_core.zos_operator:
    cmd: "D SMS,STORGRP(ALL),LISTVOL"
  register: zos_extract_sms_storgrp_reply

- name: Write {{ zos_extract_sms_outfile }}
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_sms_outfile }}"
    mode: "0644"
    content: "{{ (zos_extract_sms_storgrp_reply.stdout_lines | join('\n')) ~ '\n' }}"
  delegate_to: localhost

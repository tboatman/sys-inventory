---
# Minimal first cut: the active WLM policy name/mode only, same "single
# small record" shape sysinfo.yml/sysinfo_parser.py already use for
# 'D SYMBOLS'/'D IPLINFO'. Full service-class/goal/resource-group
# definitions need the z/OSMF WLM REST API (the already-pinned-but-unused
# ibm.ibm_zosmf collection) -- a materially bigger follow-up, not part of
# this cut.
#
# Only one console command here, so the raw reply is written verbatim,
# no ##BLOCKNAME sentinel needed -- same "single command, no bundling"
# shape uss_mounts.yml already uses for 'D OMVS,F'.
#
# NOT YET CONFIRMED against a real system: 'D WLM,POLICY' hasn't been
# checked against an actual reply from this site (same situation
# vtam.yml/tcpip.yml/sms.yml document for their own commands) --
# wlm_parser.py's module docstring carries the full caveat.

- name: Issue D WLM,POLICY
  ibm.ibm_zos_core.zos_operator:
    cmd: "D WLM,POLICY"
  register: zos_extract_wlm_reply

- name: Write {{ zos_extract_wlm_outfile }}
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_wlm_outfile }}"
    mode: "0644"
    content: "{{ (zos_extract_wlm_reply.stdout_lines | join('\n')) ~ '\n' }}"
  delegate_to: localhost

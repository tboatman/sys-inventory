---
# Shared worker for cics.yml: queries active jobs/STCs matching one
# configured job-name pattern and accumulates the active (ret_code is
# none) matches into zos_extract_cics_jobs, across the loop in
# cics.yml. include_tasks (dynamic), not import_tasks, since state
# (the running zos_extract_cics_jobs list) is threaded across
# iterations -- same reasoning as _member_dump.yml's own header comment
# for why that's safe here under --tags filtering (no tags on this
# include itself).

- name: Query active jobs/STCs matching {{ zos_extract_cics_pattern }}
  ibm.ibm_zos_core.zos_job_query:
    job_name: "{{ zos_extract_cics_pattern }}"
  register: zos_extract_cics_pattern_result

- name: Accumulate matching active jobs
  ansible.builtin.set_fact:
    zos_extract_cics_jobs: >-
      {{ (zos_extract_cics_jobs | default([]))
         + (zos_extract_cics_pattern_result.jobs | default([]) | selectattr('ret_code', 'none') | list) }}

---
# VTAM major-node status, start options (incl. APPN enablement/role), and
# APPN topology summary, unconditional -- same "capture raw, bundle
# several D-commands into one ##BLOCKNAME-sentinel file, parse off-host"
# idiom sysinfo.yml already uses for 'D SYMBOLS'/'D IPLINFO'
# (vtam_parser.py's job is to parse vtam.txt the way sysinfo_parser.py
# parses sysinfo.txt).
#
# All three commands are now CONFIRMED against real replies (across two
# follow-up rounds) -- vtam_parser.py's module docstring carries the full
# detail for each, including the couple of real shape differences from
# the original guesses (MAJNODES' real per-row shape, VTAMOPTS' one
# confirmed minor value-truncation limitation) and what turned out to be
# genuinely different about 'D NET,TOPO' (a topology *database summary*,
# not a list of individual known nodes by name, contrary to what an
# earlier round assumed when it explicitly skipped this command for being
# "even less certain" than MAJNODES/VTAMOPTS). See VtamTopologySummary in
# models.py for that last one.

- name: Issue D NET,MAJNODES
  ibm.ibm_zos_core.zos_operator:
    cmd: "D NET,MAJNODES"
  register: zos_extract_vtam_majnodes_reply

- name: Issue D NET,VTAMOPTS
  ibm.ibm_zos_core.zos_operator:
    cmd: "D NET,VTAMOPTS"
  register: zos_extract_vtam_options_reply

- name: Issue D NET,TOPO
  ibm.ibm_zos_core.zos_operator:
    cmd: "D NET,TOPO"
  register: zos_extract_vtam_topo_reply

- name: Join the D NET,MAJNODES/D NET,VTAMOPTS/D NET,TOPO reply lines into plain text
  # Deliberately double-quoted scalars, not block scalars: YAML resolves
  # the \n escape below to a real newline before Jinja sees it. A block
  # scalar leaves it as literal backslash-n text instead (confirmed by
  # testing both forms, same pitfall sysinfo.yml's own comment
  # documents), which would corrupt the
  # ##MAJNODES/##VTAMOPTS/##TOPO sentinel format vtam_parser.py expects.
  ansible.builtin.set_fact:
    zos_extract_vtam_majnodes_text: "{{ zos_extract_vtam_majnodes_reply.stdout_lines | join('\n') }}"
    zos_extract_vtam_options_text: "{{ zos_extract_vtam_options_reply.stdout_lines | join('\n') }}"
    zos_extract_vtam_topo_text: "{{ zos_extract_vtam_topo_reply.stdout_lines | join('\n') }}"

- name: Write {{ zos_extract_vtam_outfile }}
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_vtam_outfile }}"
    mode: "0644"
    content: |-
      ##MAJNODES
      {{ zos_extract_vtam_majnodes_text }}
      ##VTAMOPTS
      {{ zos_extract_vtam_options_text }}
      ##TOPO
      {{ zos_extract_vtam_topo_text }}
  delegate_to: localhost

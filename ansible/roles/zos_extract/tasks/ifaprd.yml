---
# Same zos_find + zos_fetch approach as ssn_commnd.yml (see
# _member_dump.yml). Not every shop uses IFAPRDxx (zos-extract/README.md
# step 3), so a PARMLIB with zero matching members is a soft warning, not
# a failure -- the ifaprd.txt file for that library just doesn't get
# written (matching extrproc.py's old behavior: `inventory ingest` treats
# a missing input file as "no data").

- name: Build a regex from the IFAPRDxx member filter
  ansible.builtin.set_fact:
    zos_extract_ifaprd_regex: >-
      {{ '^' ~ (zos_extract_ifaprd_member_filter
         | regex_replace('([.^$+{}\[\]|()])', '\\\1')
         | regex_replace('\*', '.*')
         | regex_replace('\?', '.')) ~ '$' }}

- name: Dump product enablement (IFAPRDxx) definitions
  ansible.builtin.include_tasks: _member_dump.yml
  loop: "{{ zos_extract_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"
  vars:
    zos_extract_dsn: "{{ item.dsn }}"
    zos_extract_member_regex: "{{ zos_extract_ifaprd_regex }}"
    zos_extract_outfile: "{{ item.prefix }}_ifaprd.txt"
    zos_extract_warn_if_empty: true

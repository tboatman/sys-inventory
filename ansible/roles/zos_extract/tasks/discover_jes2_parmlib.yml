---
# Auto-discovers exactly which JES2 init-deck member(s) JES2 actually
# read at startup, via JES2's '$DINITINFO' command, when
# zos_extract_jes2_init_members isn't explicitly set. An explicit list in
# hosts.yml always wins (this is skipped entirely if it's already
# non-empty).
#
# CONFIRMED against a real reply this round -- and the real reply changed
# the design, not just the command name. Two corrections from the
# original guess:
#   1. The command itself: '$D PARMLIB'/'$DPARMLIB' do NOT exist ("not
#      valid JES commands", confirmed against a real system) -- the real
#      command is '$DINITINFO' ("display initialization information"),
#      which replies with message $HASP825:
#        $HASP825 INITINFO
#        $HASP825 INITINFO  --- Command used to start JES2
#        $HASP825           S JES2,PARM='WARM,NOREQ'
#        $HASP825           --- HASPPARM data sets read
#        $HASP825           DSN=SYS1.SYSB.PARMLIB(JES2PABN),
#        $HASP825           VOLSER=SYSBW1,CARDS=886,
#        $HASP825           DSN=SYS1.SYSB.PARMLIB(JES2NJE),VOLSER=SYSBW1,
#        $HASP825           CARDS=350
#      Still matched generically ('\$HASP\d+', not a hardcoded '825') the
#      same way this file always did, in case the real message ID varies
#      by release/site the way $D PROCLIB's $HASP319 apparently doesn't
#      but this one might.
#   2. The design itself: the real reply doesn't describe a *concatenation*
#      to search for "the active member" in the way PROCLIB/PARMLIB/JES2
#      PROCLIB do (there's no suffix-selection mechanism for JES2's own
#      init deck) -- it lists the EXACT dsn(member) pairs JES2 actually
#      read ("HASPPARM data sets read"), using 'DSN=' (not 'DSNAME=', the
#      token $D PROCLIB's own $HASP319 message uses -- confirmed these
#      two JES2 messages genuinely use different field names). Treating
#      this the original way (dump every member of the whole PARMLIB
#      dataset, same as proclib.yml's "everything, unfiltered" approach)
#      would be actively wrong here: SYS1.SYSB.PARMLIB above is a
#      site-wide shared PARMLIB likely holding many unrelated members
#      (IEASYSxx, IEFSSNxx, ...), not just JES2's own -- dumping all of it
#      would be noisy and wasteful. So this now extracts the specific
#      dsn+member pairs directly, and jes2parm.yml fetches exactly those,
#      not every member of their owning dataset(s).

- name: Issue $DINITINFO (JES2)
  ibm.ibm_zos_core.zos_operator:
    cmd: '\$DINITINFO'
  register: zos_extract_jes2_initinfo_reply
  when: zos_extract_jes2_init_members | length == 0

- name: Keep only the $HASPnnn data lines, stripped of the message-id prefix
  ansible.builtin.set_fact:
    zos_extract_jes2_initinfo_data_lines: >-
      {{ zos_extract_jes2_initinfo_reply.stdout_lines
         | select('match', '.*\$HASP\d+.*')
         | map('regex_replace', '^.*\$HASP\d+\s*', '')
         | list }}
  when: zos_extract_jes2_init_members | length == 0

- name: Reassemble the wrapped $DINITINFO message into one string
  ansible.builtin.set_fact:
    zos_extract_jes2_initinfo_joined: "{{ zos_extract_jes2_initinfo_data_lines | join(' ') }}"
  when: zos_extract_jes2_init_members | length == 0

- name: Extract the exact dsn(member) pairs JES2 read, in read order
  ansible.builtin.set_fact:
    zos_extract_jes2_init_members: "{{ zos_extract_jes2_init_members_json | from_json }}"
  vars:
    zos_extract_jes2_init_pairs: "{{ zos_extract_jes2_initinfo_joined | regex_findall('DSN=([A-Za-z0-9$#@.]+)\\(([A-Za-z0-9$#@]+)\\)') }}"
    zos_extract_jes2_init_members_json: |-
      [
      {% for dsn, member in zos_extract_jes2_init_pairs %}
      {"dsn": "{{ dsn }}", "member": "{{ member }}"}{{ "," if not loop.last else "" }}
      {% endfor %}
      ]
  when: zos_extract_jes2_init_members | length == 0

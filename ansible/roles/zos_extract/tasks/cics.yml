---
# Live "what's running" CICS discovery -- no CMCI/CICSplex SM at this
# site, so there's no way to reach actual CICS resource definitions
# (transactions, programs, files, regions defined in a CSD); this is
# strictly a snapshot of which CICS regions are up right now. Consumes
# zos_extract_active_as_entries from discover_active_address_spaces.yml
# (see that file for why 'D A,L' is used instead of zos_job_query).
#
# A region counts as CICS if either its PROCSTEP is literally "CICS"
# (true for every actual CICS region in a real reply from this site) or
# its job name matches one of zos_extract_cics_job_patterns (this
# site's conventions: CTS*, ECB2*, MTSEDUC*) -- OR'd together as a
# fallback in case some region uses a PROCSTEP other than "CICS".
#
# Opt-in: skipped entirely unless zos_extract_cics_job_patterns is
# configured (same convention as zos_extract_catalog_patterns/racf).

- name: Build a combined regex from the configured CICS job-name patterns
  ansible.builtin.set_fact:
    zos_extract_cics_job_regex: >-
      {{
        '^(' ~ (zos_extract_cics_job_patterns
           | map('regex_replace', '([.^$+{}\[\]|()])', '\\\1')
           | map('regex_replace', '\*', '.*')
           | map('regex_replace', '\?', '.')
           | join('|')) ~ ')$'
      }}
  when: zos_extract_cics_job_patterns | length > 0

- name: Write cics.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_cics_outfile }}"
    mode: "0644"
    content: |-
      {% for entry in zos_extract_active_as_entries | default([]) %}
      {% if entry[2] == 'CICS' or (entry[0] is match(zos_extract_cics_job_regex)) %}
      {{ entry[0] }} {{ entry[1] }} {{ entry[2] }} {{ entry[3] }} {{ entry[4] }}
      {% endif %}
      {% endfor %}
  delegate_to: localhost
  when: zos_extract_cics_job_patterns | length > 0

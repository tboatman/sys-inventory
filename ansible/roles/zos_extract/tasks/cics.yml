---
# Live "what's running" CICS discovery -- no CMCI/CICSplex SM at this
# site, so there's no way to reach actual CICS resource definitions
# (transactions, programs, files, regions defined in a CSD); this is
# strictly a snapshot of which CICS regions are up right now, same
# "what's running" scope as activity.yml's active_jobs.txt.
#
# Issues one zos_job_query per configured job-name pattern (see
# _cics_job_query.yml) rather than a single job_name: "*" query for
# every active job/STC on the system -- a real run of the "*" form
# crashed ZOAU's own jls utility here:
#   CEE3209S The system detected a fixed-point divide exception
#   (System Completion Code=0C9) ... at entry point parseSMFRecord
# a bug in ZOAU's SMF-record parsing, not this playbook's logic.
# job_name is the only filter zos_job_query exposes, so narrowing to
# the three configured patterns individually is the only lever
# available to avoid whatever job was tripping it -- and it's cheaper
# besides (server-side name filtering vs a full scan).
#
# Trade-off: this drops the "catch a region whose name doesn't follow
# the configured convention via its executing program being DFHSIP"
# fallback an earlier version of this file had -- that needed a
# system-wide "*" query, which isn't safe to issue here anymore.
# program_name is still recorded per matched job in cics.txt for
# visibility, just not used as an inclusion filter on its own.
#
# Opt-in: skipped entirely unless zos_extract_cics_job_patterns is
# configured (same convention as zos_extract_catalog_patterns/racf).

- name: Query active jobs/STCs for each configured CICS job-name pattern
  ansible.builtin.include_tasks: _cics_job_query.yml
  loop: "{{ zos_extract_cics_job_patterns }}"
  loop_control:
    loop_var: zos_extract_cics_pattern
    label: "{{ zos_extract_cics_pattern }}"
  when: zos_extract_cics_job_patterns | length > 0

- name: Write cics.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_cics_outfile }}"
    mode: "0644"
    content: |-
      {% for job in zos_extract_cics_jobs | default([]) %}
      {{ job.job_id }} {{ job.job_name }} {{ job.program_name | default('?') }} {{ job.asid }}
      {% endfor %}
  delegate_to: localhost
  when: zos_extract_cics_job_patterns | length > 0

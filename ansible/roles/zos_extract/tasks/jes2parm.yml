---
# JES2 initialization parameters (step 12) -- JES2's own init deck, read
# from whatever PARMLIB concatenation discover_jes2_parmlib.yml found (or
# zos_extract_jes2_parmlibs, if set by hand in hosts.yml). This is
# genuinely separate from two things this role already covers:
#   - SYS1.PARMLIB's IEFSSNxx/COMMNDxx/IEASYSxx members (ssn_commnd.yml,
#     discover_active_members.yml) -- a different PARMLIB concatenation
#     entirely, JES2 has its own.
#   - The JES2 PROCLIB concatenation (discover_proclib.yml/proclib.yml,
#     via '$D PROCLIB') -- that's the library JES2 resolves EXEC PROC=
#     against for batch jobs; this is JES2's *own configuration*, read at
#     JES2 startup/$ACTIVATE, a different JES2 command entirely ('$D
#     PARMLIB', not '$D PROCLIB').
#
# Dumps every member of every discovered/configured JES2 PARMLIB entry
# (same "everything, unfiltered" approach proclib.yml takes for PROCLIB),
# rather than trying to first determine "the one active member" the way
# ssn_commnd.yml/ifaprd.yml narrow down to an active IEFSSNxx/COMMNDxx/
# IFAPRDxx suffix -- JES2's own active-member-selection mechanism isn't
# confirmed here, so dumping the whole concatenation and letting
# jes2parm_parser.py sort out every statement is the safer default.

- name: Dump every member of each JES2 PARMLIB concatenation entry
  ansible.builtin.include_tasks: _member_dump.yml
  loop: "{{ zos_extract_jes2_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"
  vars:
    zos_extract_dsn: "{{ item.dsn }}"
    zos_extract_member_regex: '.*'
    zos_extract_outfile: "{{ item.prefix }}_jes2parm.txt"
    zos_extract_warn_if_empty: false

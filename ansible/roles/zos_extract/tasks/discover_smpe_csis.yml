---
# Finds VSAM clusters that LOOK like SMP/E CSIs, by name only -- there's
# no system command that enumerates registered CSIs the way D PARMLIB/
# $D PROCLIB does for PROCLIB/PARMLIB (SMP/E doesn't register a CSI
# anywhere central; it's just a VSAM KSDS a site chooses to use as one).
# So this is a naming-convention heuristic, not a guaranteed-complete or
# guaranteed-accurate list -- anything it finds needs a human to confirm
# is really usable as an SMPCSI (e.g. by pointing smplist.yml at it)
# before being set as zos_extract_smpe_csi.
#
# Opt-in: skipped entirely unless zos_extract_smpe_csi_search_patterns is
# configured (same convention as zos_extract_catalog_patterns/racf) --
# but see defaults/main.yml, it defaults to non-empty ("**.CSI").
#
# This does NOT use zos_find (unlike catalog.yml): zos_find's own docs
# say it "does not support wildcards for high level qualifiers" -- e.g.
# SOME.*.DATA.SET is valid but *.DATA.SET is not -- confirmed the hard
# way first (a real run against this site's "**.CSI" convention
# silently returned nothing, no error, because the leading "**" isn't a
# supported wildcard position at all). A suffix-only naming convention
# (no shared prefix) has no catalog-search primitive on z/OS, full stop
# -- the only way to find "every dataset ending in .CSI" is to list
# every cataloged entry and filter client-side, so that's what this
# does: a bare IDCAMS LISTCAT (no ENTRIES/LEVEL restriction) lists every
# entry of every type in the target catalog(s). Note there's no bare
# "list every CLUSTER" filter either -- CLUSTER/DATA/etc as a modal
# keyword only disambiguates a specific ENTRIES() name, it isn't a
# whole-catalog type filter (confirmed the hard way too: "LISTCAT
# CLUSTER ." got IDC3211I KEYWORD '.' IS IMPROPER on a real run) -- so
# this lists everything (aliases, GDGs, non-VSAM, clusters, ...) and the
# next task keeps only the "CLUSTER -------- name" header lines before
# matching zos_extract_smpe_csi_search_patterns locally (same
# fnmatch-to-regex conversion ssn_commnd.yml/ifaprd.yml use for their
# member filters).
#
# CPU note: this really is a full scan of the catalog's index (BCS) --
# there's no cheaper way to do a suffix-only search. If your site's CSI
# names DO share a prefix, use a prefix-anchored pattern instead (e.g.
# "SMPE.*.CSI") -- zos_find supports that, and catalog.yml already uses
# it via LISTCAT LEVEL(...), which is a narrow lookup, not a full scan.
#
# Catalog scope: only searches the catalog(s) named in
# zos_extract_smpe_csi_search_catalogs, or the connected default catalog
# if that's empty. LISTCAT with no CATALOG() override does NOT descend
# into other user catalogs reachable via alias -- if your CSIs live in a
# separate user catalog, name it explicitly.

- name: Run a bare IDCAMS LISTCAT for every cataloged entry
  ibm.ibm_zos_core.zos_mvs_raw:
    program_name: IDCAMS
    auth: true
    max_rc: 4
    dds:
      - dd_output:
          dd_name: SYSPRINT
          return_content:
            type: text
      - dd_input:
          dd_name: SYSIN
          content: >-
            {{ zos_extract_smpe_csi_search_catalogs
               | map('regex_replace', '^(.*)$', ' LISTCAT CATALOG(\1) .')
               | list
               | default([' LISTCAT .'], true) }}
  register: zos_extract_smpe_csi_listcat_result
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: Extract every cataloged cluster name
  ansible.builtin.set_fact:
    zos_extract_smpe_csi_all_clusters: >-
      {{ (zos_extract_smpe_csi_listcat_result.dd_names | selectattr('dd_name', 'equalto', 'SYSPRINT') | first).content
         | select('match', '^\s*CLUSTER\s*-+\s*\S+')
         | map('regex_replace', '^\s*CLUSTER\s*-+\s*(\S+).*', '\1')
         | list }}
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: Build a combined regex from the configured CSI naming patterns
  ansible.builtin.set_fact:
    zos_extract_smpe_csi_regex: >-
      {{
        '^(' ~ (zos_extract_smpe_csi_search_patterns
           | map('regex_replace', '([.^$+{}\[\]|()])', '\\\1')
           | map('regex_replace', '\*', '.*')
           | map('regex_replace', '\?', '.')
           | join('|')) ~ ')$'
      }}
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: Filter to cluster names matching the configured CSI naming patterns
  ansible.builtin.set_fact:
    zos_extract_smpe_csi_candidates: "{{ zos_extract_smpe_csi_all_clusters | select('match', zos_extract_smpe_csi_regex) | list }}"
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: Write the CSI candidate list
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_smpe_csi_candidates_outfile }}"
    mode: "0644"
    content: |-
      ##CSI_CANDIDATES (naming-heuristic matches only -- confirm before use)
      {% for name in zos_extract_smpe_csi_candidates | default([]) %}
      {{ name }}
      {% endfor %}
  delegate_to: localhost
  when: zos_extract_smpe_csi_search_patterns | length > 0

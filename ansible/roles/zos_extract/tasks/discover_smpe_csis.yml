---
# Finds VSAM clusters that LOOK like SMP/E CSIs, by name only -- there's
# no system command that enumerates registered CSIs the way D PARMLIB/
# $D PROCLIB does for PROCLIB/PARMLIB (SMP/E doesn't register a CSI
# anywhere central; it's just a VSAM KSDS a site chooses to use as one).
# So this is a naming-convention heuristic, not a guaranteed-complete or
# guaranteed-accurate list -- anything it finds needs a human to confirm
# is really usable as an SMPCSI (e.g. by pointing smplist.yml at it)
# before being set as zos_extract_smpe_csi.
#
# Opt-in: skipped entirely unless zos_extract_smpe_csi_search_patterns is
# configured (same convention as zos_extract_catalog_patterns/racf) --
# but see defaults/main.yml, it defaults to non-empty ("EDUC.**.CSI").
#
# Uses zos_find, same as catalog.yml's non-VSAM search (just
# resource_type: cluster instead of nonvsam) -- this only works because
# this site's real convention has a fixed, literal first qualifier
# (EDUC). zos_find's own docs say it "does not support wildcards for
# high level qualifiers" -- e.g. SOME.*.DATA.SET is valid but
# *.DATA.SET is not -- so a genuinely suffix-only/no-shared-prefix
# pattern (an earlier "**.CSI" guess) can't go through zos_find at all;
# that needs an unrestricted IDCAMS LISTCAT ALL scan plus a client-side
# filter instead, which is real overkill once there's a literal prefix
# to anchor on like this one.

- name: Find VSAM clusters matching the configured CSI naming patterns
  ibm.ibm_zos_core.zos_find:
    patterns: "{{ zos_extract_smpe_csi_search_patterns }}"
    resource_type: [cluster]
  register: zos_extract_smpe_csi_find
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: Write the CSI candidate list
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_smpe_csi_candidates_outfile }}"
    mode: "0644"
    content: |-
      ##CSI_CANDIDATES (naming-heuristic matches only -- confirm before use)
      {% for d in zos_extract_smpe_csi_find.data_sets | default([]) %}
      {{ d.name }}
      {% endfor %}
  delegate_to: localhost
  when: zos_extract_smpe_csi_search_patterns | length > 0

---
# Shared worker for smplist.yml, included once per zone via include_tasks
# (block does not support loop in this ansible-core version -- confirmed:
# 'loop' is not a valid attribute for a Block -- so per-zone state
# threaded across these three tasks needs a real dynamic include; see
# _member_dump.yml's header comment for why that's safe here under
# --tags filtering).

- name: Build the GIMSMP DD list for {{ zos_extract_zone }}
  ansible.builtin.set_fact:
    zos_extract_smplist_dds: >-
      {{
        [
          {'dd_data_set': {'dd_name': 'SMPCSI', 'data_set_name': zos_extract_smpe_csi, 'disposition': 'shr'}},
          {'dd_dummy': {'dd_name': 'SMPLOG'}},
          {'dd_dummy': {'dd_name': 'SMPLOGA'}},
          {'dd_data_set': {'dd_name': 'SMPWRK6', 'data_set_name': zos_extract_smpe_workhlq ~ '.SMPWRK6',
                            'disposition': 'new', 'type': 'pds', 'record_format': 'fb', 'record_length': 80,
                            'directory_blocks': 10, 'space_primary': 5, 'space_type': 'm', 'replace': true,
                            'disposition_normal': 'delete', 'disposition_abnormal': 'delete'}},
          {'dd_input': {'dd_name': 'SMPCNTL', 'content': ['SET BDY(' ~ zos_extract_zone ~ ').', 'LIST DDDEF .', 'LIST MOD .', 'LIST SYSMOD .']}},
          {'dd_output': {'dd_name': 'SMPLIST', 'return_content': {'type': 'text'}}}
        ] + ([{'dd_data_set': {'dd_name': 'STEPLIB', 'data_set_name': zos_extract_smpe_steplib, 'disposition': 'shr'}}] if zos_extract_smpe_steplib else [])
      }}

- name: Run GIMSMP LIST DDDEF/MOD/SYSMOD for {{ zos_extract_zone }}
  ibm.ibm_zos_core.zos_mvs_raw:
    program_name: GIMSMP
    auth: true
    max_rc: 4
    dds: "{{ zos_extract_smplist_dds }}"
  register: zos_extract_gimsmp_result

- name: Write the SMP/E LIST report for {{ zos_extract_zone }}
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_zone | lower }}.smplist.txt"
    mode: "0644"
    content: >-
      {{ ((zos_extract_gimsmp_result.dd_names | selectattr('dd_name', 'equalto', 'SMPLIST') | first).content | join('\n')) ~ '\n' }}
  delegate_to: localhost

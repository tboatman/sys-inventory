---
# Deepened DB2 subsystem view (step 17): installed packages/plans via a
# read-only DSNTEP2 batch SQL query -- genuinely reachable, unlike real
# CICS resource definitions (blocked on missing CMCI/CICSplex SM at this
# site, see cics.yml/ansible/README.md). Distinct from db2.yml above,
# which only reports whether a DB2 address space is currently up (a
# live-activity heuristic via 'D A,L', not real catalog content).
#
# Opt-in: skipped entirely unless zos_extract_db2_ssid is configured
# (same convention as zos_extract_catalog_patterns/racf_database_dsn).
# Requires a real SELECT-capable dynamic-SQL program already bound at the
# target site (zos_extract_db2_program/zos_extract_db2_plan, both default
# "DSNTEP2" -- IBM's own sample program/plan name, but sites commonly
# rebind/rename or recompile their own copy under a different name). A
# real run against this site's DBDG subsystem got DSNE139E "NOT ABLE TO
# LOCATE DSNTEP2 IN THE STANDARD SEARCH ORDER" -- the default isn't
# installed here under that name. zos_extract_db2_program was originally
# hardcoded to the literal "DSNTEP2" in the RUN command with no way to
# override it at all; fixed here since a site's real bound copy can have
# a different program name than its plan name, or vice versa. NOTE:
# DSNTIAD, IBM's other sample dynamic-SQL program, is NOT a substitute
# here despite the superficially similar shape -- confirmed via IBM's own
# docs that DSNTIAD cannot run SELECT statements at all (UPDATE/INSERT/
# DELETE/CREATE/GRANT/LABEL ON only), and every query this task runs is a
# SELECT.
#
# Also requires, if the program isn't already reachable via the default
# STEPLIB concatenation, zos_extract_db2_steplib naming the DB2 load
# library(-ies) it needs -- a LIST, not a single DSN. Went through two
# real revisions against this site's DBDG subsystem before landing here:
# first a single DSN (like zos_extract_smpe_steplib's own precedent),
# which failed with "IKJ56500I COMMAND DSN NOT FOUND" (DB2's own load
# modules are conventionally split across SDSNLOAD plus SDSNLOD2, an IBM
# DB2-for-z/OS installation convention, not a site quirk); then two fixed
# DSN slots, which still wasn't enough once a real run needed a THIRD
# STEPLIB DSN (this site's own DSND10.DBDG.RUNLIB.LOAD, where its real
# bound copy actually lives) -- a fixed slot count kept proving too
# narrow, so this is a real list now, combined via zos_mvs_raw's
# dd_concat (confirmed against ibm_zos_core's own module docs that a real
# concatenation needs dd_concat, not just multiple dd_data_set entries
# sharing one dd_name). The dd_data_set entries themselves are built via
# a task-level `loop:` (not a Jinja list comprehension/map-to-dict chain
# -- this ansible-core's native templating doesn't support comprehensions
# at all, confirmed by testing one directly; a loop-based set_fact
# accumulating "{{ (x | default([])) + [item] }}" per iteration is the
# supported way to build a list of dicts from a list of scalars here).
#
# zos_mvs_raw runs IKJEFT01 (TSO batch, the standard way to invoke
# DSNTEP2) the same way racf.yml runs IRRDBU00 and catalog.yml runs
# IDCAMS -- dd_input for SYSTSIN (the DSN/RUN command) and SYSIN (the
# SELECT itself), dd_output for SYSPRINT (DSNTEP2's report) and for
# SYSTSPRT (originally dd_dummy, but a real run against this site's DBDG
# subsystem failed with rc=12/empty SYSPRINT and nothing to diagnose why
# -- SYSTSPRT is where the DSN/RUN TSO command processor itself prints
# diagnostics like connection failures, plan-not-found, or RACF
# authorization errors, and dummying it out threw that information away;
# captured as text now, same as SYSPRINT), same per-DD-list-built-in-Jinja
# idiom _smplist_zone.yml uses for its optional STEPLIB. Two separate
# invocations (one per catalog table) rather than one job with two SELECT
# statements, so each result can be captured under its own unambiguous
# ##BLOCKNAME sentinel -- both queries share the same NAME/CREATOR/
# BINDTIME column shape, so nothing in DSNTEP2's own report output could
# otherwise tell the two blocks apart the way vtam.yml's two different
# D-commands read differently. A ";;SSID=" marker line (not part of
# DSNTEP2's own report, same idiom tcpip.yml's ";;SOURCE_DSN=" marker
# uses) tags each block with which subsystem it ran against, for
# db2_catalog_parser.py to pick up.
#
# THIS IS THE MOST SPECULATIVE DOMAIN IN THE PIPELINE: DSNTEP2's exact
# authorization/PLAN/STEPLIB requirements vary by site DB2 setup, and
# neither this task's SQL/JCL shape nor db2_catalog_parser.py's report
# parsing has been checked against a real DB2 subsystem -- see that
# module's docstring for the full caveat. Validate before relying on
# this more than any other dimension in this pipeline.

- name: Build the STEPLIB dd_data_set entries
  ansible.builtin.set_fact:
    zos_extract_db2_steplib_dds: "{{ (zos_extract_db2_steplib_dds | default([])) + [{'dd_data_set': {'data_set_name': item, 'disposition': 'shr'}}] }}"
  loop: "{{ zos_extract_db2_steplib }}"

- name: Build the shared DSNTEP2 DD list (STEPLIB optional, SYSIN set per query below)
  ansible.builtin.set_fact:
    zos_extract_db2_base_dds: >-
      {{
        [
          {'dd_input': {'dd_name': 'SYSTSIN', 'content': ['DSN SYSTEM(' ~ zos_extract_db2_ssid ~ ')',
                                                            'RUN PROGRAM(' ~ zos_extract_db2_program ~ ') PLAN(' ~ zos_extract_db2_plan ~ ')',
                                                            'END']}},
          {'dd_output': {'dd_name': 'SYSPRINT', 'return_content': {'type': 'text'}}},
          {'dd_output': {'dd_name': 'SYSTSPRT', 'return_content': {'type': 'text'}}}
        ]
        + ([{'dd_concat': {'dd_name': 'STEPLIB', 'dds': zos_extract_db2_steplib_dds | default([])}}] if (zos_extract_db2_steplib_dds | default([]) | length > 0) else [])
      }}

- name: Run DSNTEP2 against SYSIBM.SYSPACKAGE
  ibm.ibm_zos_core.zos_mvs_raw:
    program_name: IKJEFT01
    auth: true
    dds: >-
      {{
        zos_extract_db2_base_dds +
        [{'dd_input': {'dd_name': 'SYSIN', 'content': ['SELECT NAME, CREATOR, BINDTIME FROM SYSIBM.SYSPACKAGE ORDER BY NAME;']}}]
      }}
  register: zos_extract_db2_syspackage_result

- name: Run DSNTEP2 against SYSIBM.SYSPLAN
  ibm.ibm_zos_core.zos_mvs_raw:
    program_name: IKJEFT01
    auth: true
    dds: >-
      {{
        zos_extract_db2_base_dds +
        [{'dd_input': {'dd_name': 'SYSIN', 'content': ['SELECT NAME, CREATOR, BINDTIME FROM SYSIBM.SYSPLAN ORDER BY NAME;']}}]
      }}
  register: zos_extract_db2_sysplan_result

- name: Extract the DSNTEP2 SYSPRINT report text
  ansible.builtin.set_fact:
    zos_extract_db2_syspackage_text: "{{ (zos_extract_db2_syspackage_result.dd_names | selectattr('dd_name', 'equalto', 'SYSPRINT') | first).content | join('\n') }}"
    zos_extract_db2_sysplan_text: "{{ (zos_extract_db2_sysplan_result.dd_names | selectattr('dd_name', 'equalto', 'SYSPRINT') | first).content | join('\n') }}"

- name: Write {{ zos_extract_db2_catalog_outfile }}
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_db2_catalog_outfile }}"
    mode: "0644"
    content: |-
      ##SYSPACKAGE
      ;;SSID={{ zos_extract_db2_ssid }}
      {{ zos_extract_db2_syspackage_text }}
      ##SYSPLAN
      ;;SSID={{ zos_extract_db2_ssid }}
      {{ zos_extract_db2_sysplan_text }}
  delegate_to: localhost

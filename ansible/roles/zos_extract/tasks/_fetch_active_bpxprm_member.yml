---
# Shared worker for discover_active_members.yml: given
# zos_extract_bpxprm_suffix, finds which configured PARMLIB (in
# search-priority order) contains BPXPRM{suffix} and appends its raw
# content (wrapped in a '##MEMBER BPXPRMxx' sentinel) to
# zos_extract_bpxprm_member_blocks (in order) for bpxprm_snapshot.yml to
# write out -- direct analog of _fetch_active_ieasys_member.yml, just for
# BPXPRMxx instead of IEASYSxx. Unlike that file, there's no separate
# "plain text, no sentinel" list here: nothing in this pipeline consumes
# BPXPRMxx content internally the way IEASYSxx's own SSN=/CMD=/PROD=/
# MSTRJCL= keywords are, so only the sentinel-wrapped form is built.
#
# Included via include_tasks (not import_tasks) since it's invoked in a
# loop with per-iteration state threaded across tasks -- see
# _member_dump.yml's header comment for why that's safe here under
# --tags filtering (this carries no tags of its own).

- name: List every member of each configured PARMLIB
  ibm.ibm_zos_core.zos_find:
    patterns: "{{ zos_extract_parmlibs | map(attribute='dsn') | list }}"
  register: zos_extract_bpxprm_find

- name: Determine which configured PARMLIB(s) actually contain BPXPRM{{ zos_extract_bpxprm_suffix }}
  ansible.builtin.set_fact:
    zos_extract_bpxprm_containing_dsns: >-
      {{ (zos_extract_bpxprm_find.data_sets | default([]))
         | subelements('members', skip_missing=True)
         | selectattr('1', 'equalto', 'BPXPRM' ~ zos_extract_bpxprm_suffix)
         | map(attribute='0.name') | list }}

- name: Pick the highest-priority PARMLIB dsn that has it
  ansible.builtin.set_fact:
    zos_extract_bpxprm_dsn: >-
      {{ (zos_extract_parmlibs
          | selectattr('dsn', 'in', zos_extract_bpxprm_containing_dsns)
          | map(attribute='dsn') | list | first | default('')) }}

- name: Create a scratch directory for BPXPRM{{ zos_extract_bpxprm_suffix }}
  ansible.builtin.tempfile:
    state: directory
    prefix: zos_extract_
  register: zos_extract_bpxprm_scratch
  delegate_to: localhost
  when: zos_extract_bpxprm_dsn | length > 0

- name: Fetch BPXPRM{{ zos_extract_bpxprm_suffix }}
  ibm.ibm_zos_core.zos_fetch:
    src: "{{ zos_extract_bpxprm_dsn }}(BPXPRM{{ zos_extract_bpxprm_suffix }})"
    dest: "{{ zos_extract_bpxprm_scratch.path }}/"
    flat: true
  when: zos_extract_bpxprm_dsn | length > 0

- name: Append this member's content to the ordered list
  ansible.builtin.set_fact:
    zos_extract_bpxprm_member_blocks: >-
      {{ (zos_extract_bpxprm_member_blocks | default([]))
         + [ '##MEMBER BPXPRM' ~ zos_extract_bpxprm_suffix ~ '\n' ~ lookup('ansible.builtin.file', zos_extract_bpxprm_scratch.path ~ '/BPXPRM' ~ zos_extract_bpxprm_suffix) ] }}
  when: zos_extract_bpxprm_dsn | length > 0

- name: Remove scratch directory for BPXPRM{{ zos_extract_bpxprm_suffix }}
  ansible.builtin.file:
    path: "{{ zos_extract_bpxprm_scratch.path }}"
    state: absent
  delegate_to: localhost
  when: zos_extract_bpxprm_scratch.path is defined

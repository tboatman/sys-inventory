---
- name: Dump subsystem (IEFSSNxx) definitions
  ansible.builtin.command: >
    python3 {{ zos_extract_remote_script_dir }}/extrproc.py
    --indsn {{ item.dsn }}
    --members {{ zos_extract_ssn_member_filter }}
    --outfile {{ zos_extract_remote_output_dir }}/{{ item.prefix }}_ssn.txt
  environment: "{{ zos_extract_env }}"
  changed_when: true
  loop: "{{ zos_extract_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"

- name: Dump started-task (COMMNDxx) definitions
  ansible.builtin.command: >
    python3 {{ zos_extract_remote_script_dir }}/extrproc.py
    --indsn {{ item.dsn }}
    --members {{ zos_extract_commnd_member_filter }}
    --outfile {{ zos_extract_remote_output_dir }}/{{ item.prefix }}_commnd.txt
  environment: "{{ zos_extract_env }}"
  changed_when: true
  loop: "{{ zos_extract_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"

---
# Same zos_find + zos_fetch approach as proclib.yml (see _member_dump.yml).
# When discover_active_members.yml successfully determined the active
# IEFSSNxx/COMMNDxx suffix(es) (from the active IEASYSxx member's SSN=/
# CMD= keywords), fetch just those specific members instead of every
# member matching the broad zos_extract_ssn_member_filter/
# zos_extract_commnd_member_filter wildcard -- "what's actually in
# effect" rather than "everything defined." Falls back to the wildcard
# filter if that discovery came up empty for any reason.

- name: Build a regex for the IEFSSNxx member(s) to fetch
  ansible.builtin.set_fact:
    zos_extract_ssn_regex: >-
      {{
        ('^' ~ (zos_extract_ssn_member_filter | regex_replace('\*.*$', ''))
           ~ '(' ~ (zos_extract_active_ssn_suffixes | join('|')) ~ ')$')
        if (zos_extract_active_ssn_suffixes | default([]) | length > 0)
        else
        ('^' ~ (zos_extract_ssn_member_filter
           | regex_replace('([.^$+{}\[\]|()])', '\\\1')
           | regex_replace('\*', '.*')
           | regex_replace('\?', '.')) ~ '$')
      }}

- name: Build a regex for the COMMNDxx member(s) to fetch
  ansible.builtin.set_fact:
    zos_extract_commnd_regex: >-
      {{
        ('^' ~ (zos_extract_commnd_member_filter | regex_replace('\*.*$', ''))
           ~ '(' ~ (zos_extract_active_cmd_suffixes | join('|')) ~ ')$')
        if (zos_extract_active_cmd_suffixes | default([]) | length > 0)
        else
        ('^' ~ (zos_extract_commnd_member_filter
           | regex_replace('([.^$+{}\[\]|()])', '\\\1')
           | regex_replace('\*', '.*')
           | regex_replace('\?', '.')) ~ '$')
      }}

- name: Dump subsystem (IEFSSNxx) definitions
  ansible.builtin.include_tasks: _member_dump.yml
  loop: "{{ zos_extract_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"
  vars:
    zos_extract_dsn: "{{ item.dsn }}"
    zos_extract_member_regex: "{{ zos_extract_ssn_regex }}"
    zos_extract_outfile: "{{ item.prefix }}_ssn.txt"
    zos_extract_warn_if_empty: true

- name: Dump started-task (COMMNDxx) definitions
  ansible.builtin.include_tasks: _member_dump.yml
  loop: "{{ zos_extract_parmlibs }}"
  loop_control:
    label: "{{ item.dsn }}"
  vars:
    zos_extract_dsn: "{{ item.dsn }}"
    zos_extract_member_regex: "{{ zos_extract_commnd_regex }}"
    zos_extract_outfile: "{{ item.prefix }}_commnd.txt"
    zos_extract_warn_if_empty: true

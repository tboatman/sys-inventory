---
# Jobs: direct analog for extrjobs.py -- but calling ZOAU's jls binary
# directly via the command module (same as this file's own USS 'ps -ef'
# call below), not ibm.ibm_zos_core's zos_job_query. That module
# unconditionally requests include_extended=True (see
# discover_active_address_spaces.yml's header for the CICS/DB2 version
# of this same story), which pulls in SMF-derived fields (programname,
# cputime, srbtime) and crashed ZOAU's own jls on a real run (CEE3209S
# fixed-point divide exception in parseSMFRecord). None of those
# SMF-derived fields are needed for this dump, so this asks jls
# directly for only id,name,status,jobtype,asid -- confirmed against a
# real run that this avoids the crash entirely (rc: 0, hundreds of
# jobs) and restores the exact original "job_id name job_type asid"
# schema inventory/inventory/activity_parser.py's ActiveJob model
# expects, unlike an earlier version of this file that went through
# 'D A,L' instead and lost job_id/asid entirely.
#
# jls's JSON output nests one {id: {...}} object per job under a
# top-level "data" key; "AC" is the same active-job status value
# extrjobs.py's own docstring documents (as opposed to CC/ABEND/JCLERR/
# NOEXEC for finished/failed ones).
#
# Processes: there's no ibm.ibm_zos_core module for USS process listing
# (it's plain USS, no ZOAU/MVS concept involved, same as extrprocs.py
# itself only ever shelled out to `ps -ef` directly) -- so this still
# runs `ps -ef` via the command module, but the column-skipping parse
# extrprocs.py did in Python is reproduced in Jinja below instead of
# needing the script staged on the target.

- name: Query all active jobs and started tasks directly via jls
  ansible.builtin.command: jls -j -o id,name,status,jobtype,asid -- '/*/'
  register: zos_extract_jls_result
  changed_when: false

- name: Write active_jobs.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/active_jobs.txt"
    mode: "0644"
    content: |-
      {% for job in (zos_extract_jls_result.stdout | from_json).data.values() | selectattr('status', 'equalto', 'AC') | list %}
      {{ job.id }} {{ job.name }} {{ job.jobtype }} {{ job.asid }}
      {% endfor %}
  delegate_to: localhost

- name: Snapshot USS processes
  ansible.builtin.command: ps -ef
  register: zos_extract_ps_result
  changed_when: false

- name: Write processes.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/processes.txt"
    mode: "0644"
    content: |-
      {% for line in zos_extract_ps_result.stdout_lines[1:] %}
      {% set fields = line.split(None, 7) %}
      {% if fields | length > 7 %}
      {{ fields[7] }}
      {% endif %}
      {% endfor %}
  delegate_to: localhost

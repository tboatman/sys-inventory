---
# Jobs: was a direct analog for extrjobs.py via zos_job_query (ibm_zos_core's
# wrapper around ZOAU's jobs.fetch_multiple()), until a real run crashed
# ZOAU's own jls utility (CEE3209S fixed-point divide exception in
# parseSMFRecord). Root cause, confirmed by reading ibm_zos_core's own
# module_utils/job.py: it unconditionally calls
# jobs.fetch_multiple(..., include_extended=True) -- include_extended is
# what pulls in the SMF-derived fields (program_name, cpu_time, srb_time),
# and it's specifically SMF-record parsing that's crashing. There's no
# module option to turn include_extended off, so zos_job_query can't be
# used here at all, for any job_name filter. extrjobs.py's own
# jobs.fetch_multiple() call (no include_extended) presumably doesn't hit
# this, but zos_job_query the ansible module has no equivalent "plain"
# mode.
#
# Now consumes zos_extract_active_as_entries from
# discover_active_address_spaces.yml ('D A,L', which sidesteps ZOAU/jls
# entirely) instead. This changes active_jobs.txt's schema: 'D A,L'
# doesn't expose job ID or ASID the way zos_job_query did, only
# jobname/stepname/procstep/status/flag -- so this is no longer a
# drop-in-compatible dump for inventory/inventory/activity_parser.py's
# ActiveJob model (job_id/name/job_type/asid). That parser hasn't been
# updated to match yet; treat active_jobs.txt as informational until it
# is.
#
# Processes: there's no ibm.ibm_zos_core module for USS process listing
# (it's plain USS, no ZOAU/MVS concept involved, same as extrprocs.py
# itself only ever shelled out to `ps -ef` directly) -- so this still
# runs `ps -ef` via the command module, but the column-skipping parse
# extrprocs.py did in Python is reproduced in Jinja below instead of
# needing the script staged on the target.

- name: Write active_jobs.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/active_jobs.txt"
    mode: "0644"
    content: |-
      {% for entry in zos_extract_active_as_entries | default([]) %}
      {{ entry[0] }} {{ entry[1] }} {{ entry[2] }} {{ entry[3] }} {{ entry[4] }}
      {% endfor %}
  delegate_to: localhost

- name: Snapshot USS processes
  ansible.builtin.command: ps -ef
  register: zos_extract_ps_result
  changed_when: false

- name: Write processes.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/processes.txt"
    mode: "0644"
    content: |-
      {% for line in zos_extract_ps_result.stdout_lines[1:] %}
      {% set fields = line.split(None, 7) %}
      {% if fields | length > 7 %}
      {{ fields[7] }}
      {% endif %}
      {% endfor %}
  delegate_to: localhost

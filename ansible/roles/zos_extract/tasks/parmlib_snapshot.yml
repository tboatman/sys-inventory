---
# Explicit, always-captured counterpart to discover_parmlib.yml's own 'D
# PARMLIB' call: that one only runs when zos_extract_parmlibs isn't
# already configured (pure internal discovery plumbing), and reduces the
# reply in-place to a bare DSN list that's never saved or ingested as its
# own dimension. This one is unconditional -- own tag, not bundled under
# proclib/ssn_commnd/ifaprd -- and writes the raw reply verbatim so
# inventory/parmlib_parser.py can parse the full ENTRY/FLAGS/VOLUME/DSN
# shape off-host (same confirmed 4-column shape LNKLST/APF/
# discover_parmlib.yml already use -- see that file's own header comment
# for the real sample this was confirmed against).
#
# Deliberately a separate file/tag from discover_parmlib.yml rather than
# folding this into it: that file's own 'D PARMLIB' call is conditional
# and its result is only ever used to populate zos_extract_parmlibs, not
# written anywhere -- reusing it here would mean either running the
# command twice in some configurations or coupling an unrelated
# ingest-only dimension to internal discovery plumbing.

- name: Issue D PARMLIB (explicit capture, always run under this tag)
  ibm.ibm_zos_core.zos_operator:
    cmd: "D PARMLIB"
  register: zos_extract_parmlib_snapshot_reply

- name: Write parmlib_snapshot.txt
  ansible.builtin.copy:
    dest: "{{ zos_extract_local_output_dir }}/{{ zos_extract_parmlib_snapshot_outfile }}"
    mode: "0644"
    content: "{{ (zos_extract_parmlib_snapshot_reply.stdout_lines | join('\n')) ~ '\n' }}"
  delegate_to: localhost

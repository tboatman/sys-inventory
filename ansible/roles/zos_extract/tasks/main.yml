---
# Each import below corresponds to one numbered step in
# zos-extract/README.md's "What to run" section, but runs it via a direct
# ibm.ibm_zos_core module instead of staging and shelling out to the
# zos-extract/python/*.py script for that step -- see each task file's own
# header comment for exactly which module replaces which script/ZOAU call.
# Tags let you run a subset, e.g.
# `ansible-playbook playbooks/site.yml --tags lnklst,apf`.
#
# These use import_tasks (static), not include_tasks (dynamic), on purpose:
# with a dynamic include, tags placed on the include statement don't
# reliably propagate to the tasks inside it once --tags filtering is
# involved -- confirmed against the ansible-core version this was built
# against, where an unselected dynamic include's child tasks silently
# vanish (no error, no "skipping" notice) instead of being skipped
# visibly. Static import_tasks resolves at playbook-parse time, so tags
# apply the traditional, documented way.

- name: Ensure local output directory exists
  ansible.builtin.import_tasks: local_prep.yml
  tags: always

# The six discovery imports below (plus discover_jes2_parmlib.yml further
# down, next to jes2parm.yml) are tagged with exactly the step(s) that
# consume their output, not "always" -- so e.g. `--tags smpe_csi_discovery`
# or `--tags catalog` alone doesn't also issue $D PROCLIB/D PARMLIB/D
# IPLINFO, fetch IEASYSxx members, fetch MSTJCLxx, or issue $D PARMLIB
# (JES2) for no reason. A tagless run (the normal case) still runs all of
# them, same as before, since Ansible runs every task when no
# --tags/--skip-tags is given regardless of what tags it carries.

- name: Auto-discover the PROCLIB concatenation if not explicitly configured
  ansible.builtin.import_tasks: discover_proclib.yml
  tags: [proclib]

- name: Auto-discover the PARMLIB concatenation if not explicitly configured
  ansible.builtin.import_tasks: discover_parmlib.yml
  tags: [proclib, ssn_commnd, ifaprd, ieasys_snapshot, bpxprm_snapshot, devsup_snapshot, opt_snapshot, clock_snapshot, autor_snapshot, sched_snapshot, couple_snapshot, grscnf_snapshot, grsrnl_snapshot, smf_snapshot, ios_snapshot, consol_snapshot, igdsms_snapshot, izuprm_snapshot, diag_snapshot, iggcat_snapshot, prog_snapshot, ieasvc_snapshot, lpalst_snapshot, mlpa_snapshot, fix_snapshot, vatlst_snapshot]

- name: Determine the active IEASYSxx/IEASYMxx suffixes
  ansible.builtin.import_tasks: discover_active_parmlib_suffixes.yml
  tags: [proclib, ssn_commnd, ifaprd, ieasys_snapshot, bpxprm_snapshot, devsup_snapshot, opt_snapshot, clock_snapshot, autor_snapshot, sched_snapshot, couple_snapshot, grscnf_snapshot, grsrnl_snapshot, smf_snapshot, ios_snapshot, consol_snapshot, igdsms_snapshot, izuprm_snapshot, diag_snapshot, iggcat_snapshot, prog_snapshot, ieasvc_snapshot, lpalst_snapshot, mlpa_snapshot, fix_snapshot, vatlst_snapshot]

- name: Determine the active IEFSSNxx/COMMNDxx/IFAPRDxx members (also pulls the active MSTRJCL suffix, for discover_mstrjcl_proclibs.yml, and the full IEASYSxx/BPXPRMxx/DEVSUPxx/IEAOPTxx/CLOCKxx/AUTORxx/SCHEDxx/COUPLExx/GRSCNFxx/GRSRNLxx/SMFPRMxx/IECIOSxx/CONSOLxx/IGDSMSxx/IZUPRMxx/DIAGxx/IGGCATxx/PROGxx/IEASVCxx/LPALSTxx/IEALPAxx/IEAFIXxx/VATLSTxx content, for ieasys_snapshot.yml/bpxprm_snapshot.yml/devsup_snapshot.yml/opt_snapshot.yml/clock_snapshot.yml/autor_snapshot.yml/sched_snapshot.yml/couple_snapshot.yml/grscnf_snapshot.yml/grsrnl_snapshot.yml/smf_snapshot.yml/ios_snapshot.yml/consol_snapshot.yml/igdsms_snapshot.yml/izuprm_snapshot.yml/diag_snapshot.yml/iggcat_snapshot.yml/prog_snapshot.yml/ieasvc_snapshot.yml/lpalst_snapshot.yml/mlpa_snapshot.yml/fix_snapshot.yml/vatlst_snapshot.yml)
  ansible.builtin.import_tasks: discover_active_members.yml
  tags: [proclib, ssn_commnd, ifaprd, ieasys_snapshot, bpxprm_snapshot, devsup_snapshot, opt_snapshot, clock_snapshot, autor_snapshot, sched_snapshot, couple_snapshot, grscnf_snapshot, grsrnl_snapshot, smf_snapshot, ios_snapshot, consol_snapshot, igdsms_snapshot, izuprm_snapshot, diag_snapshot, iggcat_snapshot, prog_snapshot, ieasvc_snapshot, lpalst_snapshot, mlpa_snapshot, fix_snapshot, vatlst_snapshot]

- name: Auto-discover proclib datasets concatenated onto MSTRJCL's IEFPDSI DD, invisible to '$D PROCLIB'
  ansible.builtin.import_tasks: discover_mstrjcl_proclibs.yml
  tags: [proclib]

- name: PROCLIB/PARMLIB dumps (step 1)
  ansible.builtin.import_tasks: proclib.yml
  tags: [proclib]

- name: Subsystem & started-task dumps (step 2)
  ansible.builtin.import_tasks: ssn_commnd.yml
  tags: [ssn_commnd]

- name: Product enablement dump (step 3)
  ansible.builtin.import_tasks: ifaprd.yml
  tags: [ifaprd]

- name: Explicit PARMLIB concatenation snapshot -- own tag, not bundled with discover_parmlib.yml's implicit discovery call above (step 20, see parmlib_snapshot.yml)
  ansible.builtin.import_tasks: parmlib_snapshot.yml
  tags: [parmlib_snapshot]

- name: Explicit active IEASYSxx member snapshot -- the actual system parameters, not just the PARMLIB dataset list above (step 21, see ieasys_snapshot.yml)
  ansible.builtin.import_tasks: ieasys_snapshot.yml
  tags: [ieasys_snapshot]

- name: Explicit active BPXPRMxx member snapshot -- z/OS UNIX System Services (OMVS) configuration, named by IEASYSxx's own OMVS= keyword (step 22, see bpxprm_snapshot.yml)
  ansible.builtin.import_tasks: bpxprm_snapshot.yml
  tags: [bpxprm_snapshot]

- name: Explicit active DEVSUPxx member snapshot -- device support definitions, named by IEASYSxx's own DEVSUP= keyword (step 23, see devsup_snapshot.yml)
  ansible.builtin.import_tasks: devsup_snapshot.yml
  tags: [devsup_snapshot]

- name: Explicit active IEAOPTxx member snapshot -- system tuning/options parameters, named by IEASYSxx's own OPT= keyword (step 24, see opt_snapshot.yml)
  ansible.builtin.import_tasks: opt_snapshot.yml
  tags: [opt_snapshot]

- name: Explicit active CLOCKxx member snapshot -- TOD clock/timezone parameters, named by IEASYSxx's own CLOCK= keyword (step 25, see clock_snapshot.yml)
  ansible.builtin.import_tasks: clock_snapshot.yml
  tags: [clock_snapshot]

- name: Explicit active AUTORxx member snapshot -- WTOR auto-reply policy, named by IEASYSxx's own AUTOR= keyword (step 26, see autor_snapshot.yml)
  ansible.builtin.import_tasks: autor_snapshot.yml
  tags: [autor_snapshot]

- name: Explicit active SCHEDxx member snapshot -- PPT (Program Properties Table) entries, named by IEASYSxx's own SCH= keyword (step 27, see sched_snapshot.yml)
  ansible.builtin.import_tasks: sched_snapshot.yml
  tags: [sched_snapshot]

- name: Explicit active COUPLExx member snapshot -- XCF/sysplex couple dataset definitions, named by IEASYSxx's own COUPLE= keyword (step 28, see couple_snapshot.yml)
  ansible.builtin.import_tasks: couple_snapshot.yml
  tags: [couple_snapshot]

- name: Explicit active GRSRNLxx member snapshot -- global resource serialization resource name lists, named by IEASYSxx's own GRSRNL= keyword (step 29, see grsrnl_snapshot.yml)
  ansible.builtin.import_tasks: grsrnl_snapshot.yml
  tags: [grsrnl_snapshot]

- name: Explicit active SMFPRMxx member snapshot -- SMF recording configuration, named by IEASYSxx's own SMF= keyword (step 30, see smf_snapshot.yml)
  ansible.builtin.import_tasks: smf_snapshot.yml
  tags: [smf_snapshot]

- name: Explicit active IECIOSxx member snapshot -- I/O related parameters, named by IEASYSxx's own IOS= keyword (step 31, see ios_snapshot.yml)
  ansible.builtin.import_tasks: ios_snapshot.yml
  tags: [ios_snapshot]

- name: Explicit active CONSOLxx member snapshot -- MCS/EMCS console definitions, named by IEASYSxx's own CON= keyword (step 32, see consol_snapshot.yml)
  ansible.builtin.import_tasks: consol_snapshot.yml
  tags: [consol_snapshot]

- name: Explicit active IGDSMSxx member snapshot -- SMS base configuration, named by IEASYSxx's own SMS= keyword (step 33, see igdsms_snapshot.yml)
  ansible.builtin.import_tasks: igdsms_snapshot.yml
  tags: [igdsms_snapshot]

- name: Explicit active IZUPRMxx member snapshot -- z/OSMF configuration, named by IEASYSxx's own IZU= keyword (step 34, see izuprm_snapshot.yml)
  ansible.builtin.import_tasks: izuprm_snapshot.yml
  tags: [izuprm_snapshot]

- name: Explicit active DIAGxx member snapshot -- diagnostic function defaults, named by IEASYSxx's own DIAG= keyword (step 35, see diag_snapshot.yml)
  ansible.builtin.import_tasks: diag_snapshot.yml
  tags: [diag_snapshot]

- name: Explicit active IGGCATxx member snapshot -- catalog system parameters, named by IEASYSxx's own CATALOG= keyword (step 36, see iggcat_snapshot.yml)
  ansible.builtin.import_tasks: iggcat_snapshot.yml
  tags: [iggcat_snapshot]

- name: Explicit active GRSCNFxx member snapshot -- Global Resource Serialization configuration parameters, named by IEASYSxx's own GRSCNF= keyword (step 37, see grscnf_snapshot.yml)
  ansible.builtin.import_tasks: grscnf_snapshot.yml
  tags: [grscnf_snapshot]

- name: Explicit active PROGxx member snapshot -- dynamic APF/LNKLST/LPA/EXIT/SCHED definitions, named by IEASYSxx's own PROG= keyword (step 38, see prog_snapshot.yml)
  ansible.builtin.import_tasks: prog_snapshot.yml
  tags: [prog_snapshot]

- name: Explicit active IEASVCxx member snapshot -- user SVC routine additions/replacements, named by IEASYSxx's own SVC= keyword (step 39, see ieasvc_snapshot.yml)
  ansible.builtin.import_tasks: ieasvc_snapshot.yml
  tags: [ieasvc_snapshot]

- name: Explicit active LPALSTxx member snapshot -- Link Pack Area dataset concatenation, named by IEASYSxx's own LPA= keyword (step 40, see lpalst_snapshot.yml)
  ansible.builtin.import_tasks: lpalst_snapshot.yml
  tags: [lpalst_snapshot]

- name: Explicit active IEALPAxx member snapshot -- Modified Link Pack Area module additions, named by IEASYSxx's own MLPA= keyword (step 41, see mlpa_snapshot.yml)
  ansible.builtin.import_tasks: mlpa_snapshot.yml
  tags: [mlpa_snapshot]

- name: Explicit active IEAFIXxx member snapshot -- IBM fix/PTF-supplied Link Pack Area module additions, named by IEASYSxx's own FIX= keyword (step 42, see fix_snapshot.yml)
  ansible.builtin.import_tasks: fix_snapshot.yml
  tags: [fix_snapshot]

- name: Explicit active VATLSTxx member snapshot -- volume attribute list, named by IEASYSxx's own VAL= keyword (step 43, see vatlst_snapshot.yml)
  ansible.builtin.import_tasks: vatlst_snapshot.yml
  tags: [vatlst_snapshot]

- name: LNKLST dataset list (step 4)
  ansible.builtin.import_tasks: lnklst.yml
  tags: [lnklst]

- name: APF-authorized library list (step 5)
  ansible.builtin.import_tasks: apf.yml
  tags: [apf]

- name: LPAR/sysplex identity (step 6)
  ansible.builtin.import_tasks: sysinfo.yml
  tags: [sysinfo]

- name: USS mounted filesystem inventory (step 11)
  ansible.builtin.import_tasks: uss_mounts.yml
  tags: [uss_mounts]

- name: Auto-discover JES2's own PARMLIB concatenation if not explicitly configured
  ansible.builtin.import_tasks: discover_jes2_parmlib.yml
  tags: [jes2parm]

- name: JES2 initialization parameters (step 12)
  ansible.builtin.import_tasks: jes2parm.yml
  tags: [jes2parm]

- name: VTAM major-node status and start options, incl. APPN enablement/role (step 13)
  ansible.builtin.import_tasks: vtam.yml
  tags: [vtam]

- name: TCP/IP home addresses and (opt-in) PROFILE.TCPIP configuration (step 14)
  ansible.builtin.import_tasks: tcpip.yml
  tags: [tcpip]

- name: SMS storage groups, storage classes, and management classes (step 15)
  ansible.builtin.import_tasks: sms.yml
  tags: [sms]

- name: Active WLM policy name/mode (step 16)
  ansible.builtin.import_tasks: wlm.yml
  tags: [wlm]

- name: Deepened WLM service-class/goal definitions via z/OSMF -- opt-in, materially different transport, not run unless requested (step 18, see wlm_zosmf.yml)
  ansible.builtin.import_tasks: wlm_zosmf.yml
  tags: [wlm_zosmf, never]
  when: zos_extract_zosmf_username | length > 0

- name: Candidate SMP/E CSI discovery -- naming-heuristic only, opt-in (see discover_smpe_csis.yml)
  ansible.builtin.import_tasks: discover_smpe_csis.yml
  tags: [smpe_csi_discovery]
  when: zos_extract_smpe_csi_search_patterns | length > 0

- name: SMP/E CSI report (step 7)
  ansible.builtin.import_tasks: smplist.yml
  tags: [smplist]
  when: zos_extract_smpe_csis | length > 0

- name: SMP/E zone discovery via LIST GLOBALZONE -- authoritative zone census per CSI (see discover_smpe_zones.yml)
  ansible.builtin.import_tasks: discover_smpe_zones.yml
  tags: [smpe_zone_discovery]
  when: zos_extract_smpe_csis | length > 0

- name: Live activity snapshot (step 8)
  ansible.builtin.import_tasks: activity.yml
  tags: [activity]

- name: Discover active address spaces for CICS/DB2 snapshots (see discover_active_address_spaces.yml)
  ansible.builtin.import_tasks: discover_active_address_spaces.yml
  tags: [cics, db2]
  when: (zos_extract_cics_job_patterns | length > 0) or (zos_extract_db2_job_patterns | length > 0)

- name: Live CICS region discovery -- naming-heuristic only, opt-in (see cics.yml)
  ansible.builtin.import_tasks: cics.yml
  tags: [cics]
  when: zos_extract_cics_job_patterns | length > 0

- name: Live DB2 address space discovery -- naming-heuristic only, opt-in (see db2.yml)
  ansible.builtin.import_tasks: db2.yml
  tags: [db2]
  when: zos_extract_db2_job_patterns | length > 0

- name: Deepened DB2 catalog view -- installed packages/plans, opt-in (step 17, see db2_catalog.yml)
  ansible.builtin.import_tasks: db2_catalog.yml
  tags: [db2]
  when: zos_extract_db2_ssid | length > 0

- name: Deepened CICS resource view -- DFHRPL lineage + DFHCSDUP CSD definitions, opt-in (step 19, see cics_deepening.yml)
  ansible.builtin.import_tasks: cics_deepening.yml
  tags: [cics]
  when: zos_extract_cics_proc | length > 0

- name: CICS resource discovery via CMCI -- opt-in, materially different transport, not run unless requested (step 20, see cics_cmci.yml)
  ansible.builtin.import_tasks: cics_cmci.yml
  tags: [cics_cmci, never]
  when: zos_extract_cics_cmci_targets | length > 0

- name: Dataset catalog (step 9)
  ansible.builtin.import_tasks: catalog.yml
  tags: [catalog]
  when: zos_extract_catalog_patterns | length > 0

- name: RACF security snapshot -- implementation only, not run unless requested (step 10)
  ansible.builtin.import_tasks: racf.yml
  tags: [racf, never]
  when: zos_extract_racf_database_dsn | length > 0

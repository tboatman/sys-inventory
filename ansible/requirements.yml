---
collections:
  # >=1.14.0, not just >=1.10.0: catalog.yml's zos_stat call (the
  # non-VSAM attribute lookup) doesn't exist before 1.14.0 -- confirmed
  # the hard way, 1.12.0 installs cleanly under the old ">=1.10.0" pin
  # but fails at playbook-parse time with "couldn't resolve module/
  # action 'ibm.ibm_zos_core.zos_stat'" (import_tasks resolves every
  # task's module at parse time regardless of --tags, so this broke
  # even tag-scoped runs that never touch catalog.yml).
  - name: ibm.ibm_zos_core
    version: ">=1.14.0"
  # Not used by any task yet -- pinned for future CMCI-based CICS resource
  # discovery (transactions, programs, files, regions defined in a CSD) if
  # this site ever enables CICSplex SM. cics.yml's current CICS discovery
  # is zos_job_query-based (ibm.ibm_zos_core) and doesn't need this.
  - name: ibm.ibm_zos_cics
    version: ">=2.0.0"
  # Not used by any task yet -- pinned for future IMS discovery (regions,
  # databases, transactions) if this ever expands past CICS/PROCLIB/PARMLIB.
  - name: ibm.ibm_zos_ims
    version: ">=1.4.0"
  # Not used by any task yet -- pinned for future z/OSMF REST API-based
  # discovery (an alternative path to some of what this role already gets
  # via console commands/ZOAU, e.g. job/dataset/console queries over HTTPS
  # instead of SSH).
  - name: ibm.ibm_zosmf
    version: ">=1.6.0"

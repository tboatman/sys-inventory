---
# Environment ZOAU/IBM Open Enterprise Python need on the target LPAR,
# straight from zos-extract/README.md's "Basic Env requirements" section.
# ibm.ibm_zos_core's modules still shell out to ZOAU/zoautil_py on the
# target under the hood, so this is applied at the play level (see
# playbooks/site.yml) to every task, not just raw commands.
# Adjust paths if your site installs ZOAU/Python somewhere else --
# ask your systems programmer if unsure.
zos_extract_env:
  PATH: "/shrd/zoautil/bin:/shrd/cyp/pyz/bin/:/bin"
  _BPXK_AUTOCVT: "ON"
  ZOAU_ROOT: "/shrd/zoautil/"
  _CEE_RUNOPTS: "FILETAG(AUTOCVT,AUTOTAG) POSIX(ON)"
  CLASSPATH: "/shrd/zoautil/lib/*:"
  STEPLIB: "none"
  LANG: "C"
  LIBPATH: "/shrd/zoautil/lib:/shrd/cyp/pyz/lib:/lib:/usr/lib:."
  TERM: "xterm"
  PYTHONPATH: "/shrd/zoautil/lib/:"
  # Without this, importing zoautil_py tries to write compiled bytecode
  # into /shrd/zoautil/lib/zoautil_py/__pycache__ -- a shared, read-only
  # install most userids can't write to (ICH408I INSUFFICIENT AUTHORITY
  # TO MKDIR). This is the standard CPython switch to never write .pyc
  # cache files at all, so it just re-compiles from source every run
  # instead (harmless -- ZOAU import isn't a hot path here).
  PYTHONDONTWRITEBYTECODE: "1"

# Where the role writes its output -- one subdirectory per inventoried
# host, ready to hand straight to `inventory ingest` (see
# ../../inventory/README.md). Every task writes here directly (via
# delegate_to: localhost); there's no separate remote-output/fetch-back
# step since the ibm.ibm_zos_core modules used here return their results
# straight to the control node.
zos_extract_local_output_dir: "{{ playbook_dir }}/../output/{{ inventory_hostname }}"
